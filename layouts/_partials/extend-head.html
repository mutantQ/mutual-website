<style>
  * { word-break: keep-all; overflow-wrap: break-word; cursor: default; }
  a, button, input, textarea, select, [role="button"] { cursor: pointer; }
  input[type="text"], input[type="email"], textarea { cursor: text; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-weight: 400;
  }
  /* 다크 배경에서는 더 가늘게 */
  .landing .hero p,
  .anchor-page p,
  .about-hero p,
  .contact-hero p {
    font-weight: 300;
  }
  h1, h2, h3, h4 {
    font-weight: 700;
  }
  strong, b {
    font-weight: 700;
  }
  /* Anchor nav link glow */
  @keyframes navAnchorGlow {
    0%, 100% { text-shadow: 0 0 8px rgba(34,211,238,0.3); }
    50% { text-shadow: 0 0 14px rgba(34,211,238,0.5); }
  }
  @keyframes navAnchorGlowDark {
    0%, 100% { text-shadow: 0 0 8px rgba(74,139,156,0.3); }
    50% { text-shadow: 0 0 14px rgba(74,139,156,0.5); }
  }
  /* Light header + mobile menu: darker teal (base) */
  nav a[href="/anchor/"],
  nav a[href="/ko/anchor/"],
  nav a[href="/anchor/"] span,
  nav a[href="/ko/anchor/"] span,
  #menu-wrapper a[href="/anchor/"],
  #menu-wrapper a[href="/ko/anchor/"],
  #menu-wrapper a[href="/anchor/"] span,
  #menu-wrapper a[href="/ko/anchor/"] span {
    color: #0e9aa7 !important;
    animation: navAnchorGlowDark 3s ease-in-out infinite;
  }
  /* Dark header: bright cyan (override) */
  .header-dark nav a[href="/anchor/"],
  .header-dark nav a[href="/ko/anchor/"],
  .header-dark nav a[href="/anchor/"] span,
  .header-dark nav a[href="/ko/anchor/"] span,
  .header-dark li a[href="/anchor/"] span.decoration-primary-500,
  .header-dark li a[href="/ko/anchor/"] span.decoration-primary-500 {
    color: #22d3ee !important;
    animation: navAnchorGlow 3s ease-in-out infinite;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
